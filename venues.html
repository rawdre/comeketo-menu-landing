<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 12px; }
h1 { font-size: 1.4em; text-align: center; margin-bottom: 8px; color: #ff6b35; }
.subtitle { text-align: center; font-size: 0.85em; color: #888; margin-bottom: 16px; }

/* Filters */
.filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.filters select, .filters input {
  flex: 1; min-width: 120px; padding: 10px 12px; border: 1px solid #333;
  border-radius: 8px; background: #1a1a1a; color: #e0e0e0; font-size: 14px;
}
.filters input { min-width: 200px; }
.filters select:focus, .filters input:focus { outline: none; border-color: #ff6b35; }

/* Stats bar */
.stats { display: flex; justify-content: space-between; padding: 8px 4px; font-size: 0.8em; color: #888; margin-bottom: 8px; }

/* Cards */
.venue-card {
  background: #1a1a1a; border-radius: 12px; padding: 14px; margin-bottom: 10px;
  border-left: 4px solid #333; transition: all 0.2s;
}
.venue-card.hot { border-left-color: #ff4444; }
.venue-card.high { border-left-color: #ffaa00; }
.venue-card.medium { border-left-color: #ffdd57; }
.venue-card.low { border-left-color: #555; }

.venue-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.venue-name { font-weight: 700; font-size: 1em; color: #fff; flex: 1; }
.venue-score {
  background: #ff6b35; color: #fff; font-weight: 700; font-size: 0.75em;
  padding: 2px 8px; border-radius: 12px; margin-left: 8px; white-space: nowrap;
}
.venue-score.s8 { background: #ff4444; }
.venue-score.s7 { background: #ff6600; }
.venue-score.s6 { background: #ff8800; }
.venue-score.s5 { background: #ccaa00; }
.venue-score.s4 { background: #888; }
.venue-score.s3, .venue-score.s2, .venue-score.s1 { background: #555; }

.venue-meta { font-size: 0.82em; color: #aaa; margin-bottom: 4px; }
.venue-meta span { margin-right: 12px; }
.venue-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.tag {
  font-size: 0.7em; padding: 2px 8px; border-radius: 10px;
  background: #2a2a2a; color: #bbb;
}
.tag.partner { background: #1a3a1a; color: #4caf50; }
.tag.outside-yes { background: #1a2a3a; color: #42a5f5; }
.tag.has-bar { background: #3a2a1a; color: #ff9800; }
.tag.skip { background: #3a1a1a; color: #f44336; }

.venue-notes { font-size: 0.8em; color: #999; margin-top: 6px; font-style: italic; }
.venue-action {
  display: inline-block; margin-top: 8px; padding: 6px 14px; border-radius: 8px;
  background: #ff6b35; color: #fff; font-size: 0.8em; font-weight: 600;
  text-decoration: none; cursor: pointer;
}
.venue-action.call { background: #4caf50; }
.venue-action.research { background: #666; }
.venue-action.skip { background: #444; color: #999; }

/* Contact actions */
.contact-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.contact-btn {
  font-size: 0.75em; padding: 4px 10px; border-radius: 6px; text-decoration: none;
  background: #2a2a2a; color: #42a5f5; border: 1px solid #333;
}
.contact-btn:hover { background: #333; }

/* Empty state */
.empty { text-align: center; padding: 40px; color: #666; }

/* Scroll to top */
.scroll-top {
  position: fixed; bottom: 20px; right: 20px; width: 44px; height: 44px;
  border-radius: 50%; background: #ff6b35; color: #fff; font-size: 20px;
  border: none; cursor: pointer; display: none; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
</style>

function getPriorityClass(score) {
  if (score >= 8) return 'hot';
  if (score >= 6) return 'high';
  if (score >= 4) return 'medium';
  return 'low';
}

function getActionClass(action) {
  if (action.includes('Email')) return '';
  if (action.includes('Call')) return 'call';
  if (action.includes('Skip')) return 'skip';
  return 'research';
}

function renderVenues(list) {
  const container = document.getElementById('venueList');
  const empty = document.getElementById('empty');
  
  if (list.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  
  container.innerHTML = list.map(v => {
    const pClass = getPriorityClass(v.score);
    const tags = [];
    if (v.existing_partner === 'Yes') tags.push('<span class="tag partner">🤝 Partner</span>');
    if (v.allows_outside === 'Yes') tags.push('<span class="tag outside-yes">✅ Outside OK</span>');
    if (v.allows_outside === 'In-House Only') tags.push('<span class="tag skip">🚫 In-House</span>');
    if (v.has_bar === 'Yes') tags.push('<span class="tag has-bar">🍸 Bar</span>');
    if (v.capacity && v.capacity !== '100') tags.push('<span class="tag">👥 ' + v.capacity + '</span>');
    tags.push('<span class="tag">' + v.distance + '</span>');
    
    const contacts = [];
    if (v.phone && v.phone !== 'Research needed') {
      const cleanPhone = v.phone.replace(/[^0-9+]/g, '');
      contacts.push('<a href="tel:' + cleanPhone + '" class="contact-btn">📞 ' + v.phone + '</a>');
    }
    if (v.email && v.email !== 'Research needed' && !v.email.includes('forms.gle') && !v.email.includes('tripleseat')) {
      contacts.push('<a href="mailto:' + v.email + '" class="contact-btn">✉️ ' + v.email + '</a>');
    }
    if (v.website && v.website !== 'Research needed' && !v.website.startsWith('Check') && !v.website.startsWith('Search')) {
      const url = v.website.startsWith('http') ? v.website : 'https://' + v.website;
      contacts.push('<a href="' + url + '" target="_blank" class="contact-btn">🌐 Website</a>');
    }
    
    return '<div class="venue-card ' + pClass + '">' +
      '<div class="venue-header">' +
        '<span class="venue-name">' + v.name + '</span>' +
        '<span class="venue-score s' + v.score + '">' + v.score + '/8</span>' +
      '</div>' +
      '<div class="venue-meta">' +
        '<span>📍 ' + v.city + ', ' + v.state + '</span>' +
        (v.contact_name && v.contact_name !== '' ? '<span>👤 ' + v.contact_name + '</span>' : '') +
      '</div>' +
      (tags.length ? '<div class="venue-tags">' + tags.join('') + '</div>' : '') +
      (v.notes && v.notes !== 'From existing CSV' ? '<div class="venue-notes">' + v.notes + '</div>' : '') +
      (contacts.length ? '<div class="contact-row">' + contacts.join('') + '</div>' : '') +
      '<span class="venue-action ' + getActionClass(v.next_action) + '">' + v.next_action + '</span>' +
    '</div>';
  }).join('');
  
  document.getElementById('countDisplay').textContent = 'Showing ' + list.length + ' venue' + (list.length !== 1 ? 's' : '');
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const priority = document.getElementById('filterPriority').value;
  const distance = document.getElementById('filterDistance').value;
  const action = document.getElementById('filterAction').value;
  const catering = document.getElementById('filterCatering').value;
  
  let filtered = venues.filter(v => {
    if (search && !v.name.toLowerCase().includes(search) && !v.city.toLowerCase().includes(search) && !(v.notes||'').toLowerCase().includes(search)) return false;
    if (priority === 'hot' && v.score < 8) return false;
    if (priority === 'high' && (v.score < 6 || v.score >= 8)) return false;
    if (priority === 'medium' && (v.score < 4 || v.score >= 6)) return false;
    if (priority === 'low' && v.score >= 4) return false;
    if (distance && v.distance !== distance) return false;
    if (action && v.next_action !== action) return false;
    if (catering && v.allows_outside !== catering) return false;
    return true;
  });
  
  renderVenues(filtered);
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('filterPriority').addEventListener('change', applyFilters);
document.getElementById('filterDistance').addEventListener('change', applyFilters);
document.getElementById('filterAction').addEventListener('change', applyFilters);
document.getElementById('filterCatering').addEventListener('change', applyFilters);

window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').style.display = window.scrollY > 300 ? 'block' : 'none';
});

renderVenues(venues);
</script>
